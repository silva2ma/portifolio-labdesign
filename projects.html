<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lab do Design - Projetos</title>
<link rel="icon" href="../PortifólioDesigner/IMAGENS/logo (2).png" sizes="900x900" type="image/png">

<!-- React / ReactDOM / Babel -->
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ✅ Font Awesome (versão estável) -->
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  integrity="sha512-rp7KjWlGwMDcxdmfd2MmVJgWjF4o0BLf6cXDAIvoAbQlRu7/3Y+v+3ZfNUvYe1+5mx5J3U00DoWBf0h+4N3J4g=="
  crossorigin="anonymous"
  referrerpolicy="no-referrer" />

<!-- ✅ Google Font Poppins -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#fafafa;
  color:#333;
}
/* ======== NOVA NAVBAR MODERNA ======== */
header{
  padding: 1rem;
  background: transparent;
}

.modern-navbar{
  max-width: 1200px;
  margin: 0 auto;
  background: linear-gradient(165deg, #ec4899 0%, #be185d 100%);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
  backdrop-filter: blur(10px);
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  color: white;
  font-weight: 700;
  font-size: 1.25rem;
  text-decoration: none;
}

.nav-brand img {
  height: 60px;
  width: 60px;
  border-radius: 8px;
}

.nav-menu {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  list-style: none;
  margin: 0;
  padding: 0;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1rem;
  color: rgba(255, 255, 255, 0.9);
  text-decoration: none;
  border-radius: 12px;
  font-weight: 500;
  font-size: 0.95rem;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.nav-item:hover {
  background: rgba(255, 255, 255, 0.15);
  color: white;
  transform: translateY(-1px);
}

.nav-item:active {
  transform: translateY(0);
}

.nav-item svg {
  width: 18px;
  height: 18px;
  opacity: 0.8;
}

.nav-item:hover svg {
  opacity: 1;
}

/* Mobile menu toggle */
.mobile-menu-toggle {
  display: none;
  background: none;
  border: none;
  color: white;
  font-size: 1.5rem;
  cursor: pointer;
  padding: 0.5rem;
  border-radius: 8px;
  transition: background 0.3s ease;
}

.mobile-menu-toggle:hover {
  background: rgba(255, 255, 255, 0.1);
}

/* Mobile styles */
@media (max-width: 768px) {
  .modern-navbar {
    padding: 1rem;
    flex-wrap: wrap;
  }
  
  .nav-menu {
    display: none;
    width: 100%;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: 1rem;
  }
  
  .nav-menu.active {
    display: flex;
  }
  
  .mobile-menu-toggle {
    display: block;
  }
  
  .nav-item {
    width: 100%;
    justify-content: flex-start;
  }
}

/* ======== SEÇÕES ======== */
section{padding:4rem 1rem;max-width:1100px;margin:auto;}
h2.section-title{text-align:center;margin-bottom:2rem;font-size:2rem;}
.projetos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,.1);transition:.2s;}
.card:hover{transform:translateY(-6px);}
.card img{width:100%;height:180px;object-fit:cover;}
.card-content{padding:1rem;}
.case-section h3{margin-top:1.5rem;color:#444;}
.case-img{width:100%;max-width:700px;display:block;margin:1rem auto;border-radius:8px;}
.skills{margin-top:1rem;}
.skills span{display:inline-block;background:#eee;padding:.4rem .8rem;border-radius:20px;margin:.3rem;font-size:.9rem;transition:background-color 0.3s ease;}
.skills span:hover{background:#be185d;;color:#fff;}
.contact-links i {
  margin-right: 6px;
  font-size: 1.2rem;
  color: #b303aa;
  transition: color 0.2s;
}
.contact-links a:hover i {color: #350319;}
.cta{display:inline-block;margin-top:1rem;padding:.8rem 1.5rem;border-radius:30px;text-decoration:none;}
footer{text-align:center;background:#be185d;color:#eee;padding:1.5rem;margin-top:2rem;}
.cta-container {
  display: flex;
  gap: 1rem;
  justify-content: flex-start;
  margin-top: 1rem;
}
.cta-light {
  background: #f0f0f0;
  color: #111;
}
.cta-light:hover {background: #e0e0e0;}
.cta-dark {
  background: #111;
  color: #fff;
}
.cta-dark:hover {background: #333;}
#home h2 {
  font-size: 3.5rem;
  font-weight: bold;
  color: #111;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
  margin-bottom: 1.5rem;
}
#home p {font-size: 1.3rem;color: #555;}
#sobre p {
  text-align: justify;
  line-height: 1.6;
  margin-bottom: 1rem;
}
/* ======== ANIMAÇÃO HOME ======== */
@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(40px); }
  100% { opacity: 1; transform: translateY(0); }
}
.home-animate {
  opacity: 0;
  animation: fadeUp 1.1s cubic-bezier(.4,0,.2,1) 0.2s forwards;
}
.home-animate-delay {
  opacity: 0;
  animation: fadeUp 1.1s cubic-bezier(.4,0,.2,1) 0.6s forwards;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
function App() {
  const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
  
  const projetos = [
    {titulo:'NUUVA – Plataforma de Autocuidado', descricao:'Branding e UI para app de bem-estar.', img:'IMAGENS/nuuva.png'},
    {titulo:'Poster AfroBeat', descricao:'Arte para festival celebrando a voz feminina negra.', img:'IMAGENS/afrobeat.png'}
  ];

  const ModernNavbar = () => (
    <header>
      <nav className="modern-navbar">
        <a href="#home" className="nav-brand">
          {/* <img src="IMAGENS/logo (2).png" alt="Logo" /> */}
          Lab do Design
        </a>
        
        <button 
          className="mobile-menu-toggle"
          onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
        >
          <i className="fas fa-bars"></i>
        </button>
        
        <div className={`nav-menu ${mobileMenuOpen ? 'active' : ''}`}>
          <a href="#projetos" className="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="9" cy="9" r="2"/>
              <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
            </svg>
            Projetos
          </a>
          
          <a href="#sobre" className="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Sobre
          </a>
          
          <a href="#contato" className="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            Contato
          </a>
        </div>
      </nav>
    </header>
  );

  return (
    <>
      <ModernNavbar />

 

      <section id="projetos">
        <h2 className="section-title">Projetos</h2>
        <div className="projetos-grid">
          {projetos.map((p,i)=>(
            <div className="card" key={i}>
              <img src={p.img || "/placeholder.svg"} alt={p.titulo}/>
              <div className="card-content">
                <h3>{p.titulo}</h3>
                <p>{p.descricao}</p>
              </div>
            </div>
          ))}
        </div>
      </section>

     


      <footer>
        © {new Date().getFullYear()} | Portfólio de Design
      </footer>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
