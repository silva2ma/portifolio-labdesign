  <html lang="pt-BR">
  <head>

  <link rel="icon" href="../PortifólioDesigner/IMAGENS/logo (2).png" sizes="900x900" type="image/png">

  <!-- React / ReactDOM / Babel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous"

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

  <style>
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#fafafa;
    color:#333;
  }

  /* ======== NAVBAR ======== */
  header{
    padding: 1rem;
    background: transparent;
  }
  .gradient-text {
    background: linear-gradient(90deg, #ec4899 0%, #be185d 50%, #000000 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .modern-navbar{
    max-width: 1200px;
    margin: 0 auto;
    background: linear-gradient(165deg, #ec4899 0%, #be185d 100%);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: white;
    font-weight: 700;
    font-size: 1.25rem;
    text-decoration: none;
  }
  .nav-menu {
    display: flex;
    gap: 0.5rem;
    list-style: none;
  }
  .nav-item {
    color: rgba(255, 255, 255, 0.9);
    text-decoration: none;
    border-radius: 12px;
    font-weight: 500;
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    transition: all 0.3s;
  }
  .nav-item:hover {
    background: rgba(255, 255, 255, 0.15);
    color: white;
  }

  /* ======== SEÇÕES ======== */
  section{padding:4rem 1rem;max-width:1100px;margin:auto;}
  h2.section-title{text-align:center;margin-bottom:2rem;font-size:2rem;}

  /* ======== GRADE DE PROJETOS ======== */
  .projetos-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:2rem;
    align-items:stretch;
  }

  .card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    transition:.2s;
  }
  .card:hover{transform:translateY(-6px);}
  .card img{
    width: 100%;
    height: clamp(160px, 22vw, 280px);
    object-fit: contain;
    background-color: #f9f9f9; /* opcional: cor do fundo */
    padding: 10px; /* opcional: dá respiro à imagem */
    transition:transform 0.4s ease;
  }
  .card:hover img{transform:scale(1.03);}
  .card-content{padding:1rem;}

  /* ======== SOBRE ======== */
  .skills span{
    display:inline-block;
    background:#eee;
    padding:.4rem .8rem;
    border-radius:20px;
    margin:.3rem;
    font-size:.9rem;
    transition:background-color 0.3s ease;
  }
  .skills span:hover{background:#be185d;color:#fff;}

  /* ======== CONTATO ======== */
  .contact-links i {
    margin-right: 6px;
    font-size: 1.2rem;
    color: #b303aa;
    transition: color 0.2s;
  }
  .contact-links a:hover i {color: #350319;}
  .cta{
    display:inline-block;
    margin-top:1rem;
    padding:.8rem 1.5rem;
    border-radius:30px;
    text-decoration:none;
  }
  .cta-dark {background:#111;color:#fff;}
  .cta-dark:hover {background:#333;}
  .cta-light {background:#f0f0f0;color:#111;}
  .cta-light:hover {background:#e0e0e0;}

  /* ======== FOOTER ======== */
  footer{text-align:center;background:#be185d;color:#eee;padding:1.5rem;margin-top:2rem;}
  </style>
  </head>

  <div id="root"></div>

  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App/>);

  </body>
