<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sobre Mim - Marcella</title>

<!-- React / ReactDOM / Babel -->
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#fafafa;
  color:#333;
}
section{padding:4rem 1rem;max-width:1100px;margin:auto;}
/* === ESTILO SOBRE === */
#sobre {
  background: linear-gradient(135deg, #ffc8e4 0%, #e2c3d3 100%);
  border-radius: 24px;
  margin: 2rem auto;
  padding: 4rem 2rem;
  position: relative;
  overflow: hidden;
}
.about-container {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 3rem;
  align-items: start;
  max-width: 1000px;
  margin: 0 auto;
}
.profile-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.profile-image {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid white;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
}
.profile-badge {
  margin-top:1rem;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 0.5rem 1rem;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
}
.profile-name {
  font-size: 1.5rem;
  font-weight: 700;
  color: #000;
  margin-top: 1rem;
}
.profile-title {
  color: #000;
  font-weight: 600;
  margin-bottom: 1rem;
}
.content-section {
  background: white;
  border-radius: 20px;
  padding: 2.5rem;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
}
.section-title-modern {
  font-size: 2.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #ec4899 0%, #000 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 2rem;
}
.about-text {
  font-size: 1.1rem;
  line-height: 1.8;
  color: #000;
  margin-bottom: 1.5rem;
  text-align: justify;
}
.skills-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 0.8rem;
  margin: 2rem 0;
}
.skill-tag {
  background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
  color: white;
  padding: 0.8rem 1.2rem;
  border-radius: 25px;
  font-size: 0.9rem;
  font-weight: 600;
  text-align: center;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
function App() {
  return (
    <section id="sobre">
      <div className="about-container">
        <div className="profile-section">
          <img src="IMAGENS/PERFIL.jpg" alt="Marcella Rodrigues" className="profile-image"/>
          <div className="profile-badge">Disponível</div>
          <h3 className="profile-name">Marcella Rodrigues</h3>
          <p className="profile-title">Designer & Desenvolvedora</p>
        </div>

        <div className="content-section">
          <h2 className="section-title-modern">Sobre Mim</h2>

          <p className="about-text">
            Olá! Sou estudante de <strong>Análise e Desenvolvimento de Sistemas</strong>, apaixonada por Design Gráfico e UI/UX.
            Minha jornada começou com a curiosidade de entender como a tecnologia pode ser mais humana e acessível.
          </p>

          <p className="about-text">
            Tenho experiência com projetos de <strong>branding</strong>, interfaces para aplicativos, ilustrações e animações.
            Cada projeto é uma oportunidade de criar algo único que conecte pessoas e tecnologia de forma significativa.
          </p>

          <div className="skills-grid">
            <span className="skill-tag">Figma</span>
            <span className="skill-tag">Photoshop</span>
            <span className="skill-tag">Illustrator</span>
            <span className="skill-tag">After Effects</span>
            <span className="skill-tag">React</span>
            <span className="skill-tag">UI/UX</span>
            <span className="skill-tag">Branding</span>
            <span className="skill-tag">Motion Design</span>
          </div>

          <p className="about-text">
            Transformo ideias em experiências visuais que conectam pessoas e tecnologia,
            sempre buscando o equilíbrio perfeito entre estética e funcionalidade.
          </p>
        </div>
      </div>
    </section>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
