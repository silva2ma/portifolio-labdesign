<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu Portfólio</title>
  <!-- React e ReactDOM via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel para JSX funcionar direto no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    header {
      background: #4a90e2;
      color: white;
      padding: 2rem;
      text-align: center;
    }
    .container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .card {
      background: white;
      padding: 1.5rem;
      margin-bottom: 1rem;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    footer {
      text-align: center;
      padding: 1rem;
      background: #eee;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const projetos = [
        { titulo: 'Site NUUVA', descricao: 'Landing page inspirada na Netflix para saúde mental.' },
        { titulo: 'Controle Financeiro', descricao: 'App React para gerenciar receitas e despesas.' },
        { titulo: 'Design AfroBeat', descricao: 'Pôster de festival destacando voz feminina negra.' }
      ];

      return (
        <>
          <header>
            <h1>Meu Portfólio</h1>
            <p>Designer & Desenvolvedora Web</p>
          </header>

          <main className="container">
            {projetos.map((p, i) => (
              <div className="card" key={i}>
                <h2>{p.titulo}</h2>
                <p>{p.descricao}</p>
              </div>
            ))}
          </main>

          <footer>
            © {new Date().getFullYear()} - Feito com React 💙
          </footer>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
